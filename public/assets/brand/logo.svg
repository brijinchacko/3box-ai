<svg width="220" height="48" viewBox="0 0 220 48" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Icon: 3 rounded rectangles forming the NXTED mark -->
  <!-- Top-right block -->
  <rect x="16" y="1" width="28" height="21" rx="4" fill="url(#logoGrad)"/>
  <!-- Left-middle block -->
  <rect x="1" y="14" width="21" height="18" rx="4" fill="url(#logoGrad)"/>
  <!-- Bottom-center block -->
  <rect x="16" y="27" width="18" height="20" rx="4" fill="url(#logoGrad)"/>
  <!-- Wordmark: nxtED -->
  <text x="54" y="35" font-family="'Nunito', 'Inter', system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5" fill="white">nxt</text>
  <text x="116" y="35" font-family="'Nunito', 'Inter', system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5" fill="white">ED</text>
  <!-- AI badge with gradient -->
  <text x="170" y="35" font-family="'Nunito', 'Inter', system-ui, sans-serif" font-size="28" font-weight="900" letter-spacing="-0.5" fill="url(#logoGrad)">AI</text>
</svg>

# NXTED AI — Nginx Reverse Proxy Configuration
# VPS IP: 72.62.230.223
# IMPORTANT: This config is for nxted.ai ONLY
# It will NOT affect your existing web apps

# Rate limiting zone
limit_req_zone $binary_remote_addr zone=nxted_api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=nxted_general:10m rate=60r/m;

# Upstream for NXTED AI (Next.js runs on port 3001 to avoid conflicts)
upstream nxted_backend {
    server 127.0.0.1:3001;
    keepalive 64;
}

# HTTP → HTTPS redirect for nxted.ai
server {
    listen 80;
    listen [::]:80;
    server_name nxted.ai www.nxted.ai;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$server_name$request_uri;
    }
}

# HTTPS server for nxted.ai
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name nxted.ai www.nxted.ai;

    # SSL certificates (Let's Encrypt via Certbot)
    ssl_certificate /etc/letsencrypt/live/nxted.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nxted.ai/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Static assets with long cache
    location /_next/static/ {
        proxy_pass http://nxted_backend;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Public assets
    location /assets/ {
        proxy_pass http://nxted_backend;
        proxy_cache_valid 200 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # robots.txt, sitemap.xml, llms.txt
    location ~* ^/(robots\.txt|sitemap\.xml|llms\.txt|llms-full\.txt|manifest\.json|favicon\.svg)$ {
        proxy_pass http://nxted_backend;
        proxy_cache_valid 200 1d;
        add_header Cache-Control "public, max-age=86400";
    }

    # API routes with rate limiting
    location /api/ {
        limit_req zone=nxted_api burst=10 nodelay;
        proxy_pass http://nxted_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # All other routes
    location / {
        limit_req zone=nxted_general burst=20 nodelay;
        proxy_pass http://nxted_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Block sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Logs (separate from other apps)
    access_log /var/log/nginx/nxtedai.access.log;
    error_log /var/log/nginx/nxtedai.error.log;
}
